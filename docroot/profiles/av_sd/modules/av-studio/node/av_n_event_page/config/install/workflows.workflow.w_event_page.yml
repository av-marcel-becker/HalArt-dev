uuid: ec33e63f-d4a3-4fe6-a6cc-dc04628b902b
langcode: de
status: true
dependencies:
  config:
    - node.type.n_event_page
  enforced:
    module:
      - av_n_event_page
  module:
    - content_moderation
id: w_event_page
label: Veranstaltung
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_ep_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_ep_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_ep_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_ep_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_ep_archives
        - w_ep_presentation
        - w_ep_release_planned
        - w_ep_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_ep_archives
        - w_ep_presentation
        - w_ep_release_planned
        - w_ep_unpublished
    w_ep_archive:
      label: Archivieren
      from:
        - published
        - w_ep_unpublished
      to: w_ep_archives
      weight: 2
    w_ep_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_ep_archives
        - w_ep_presentation
        - w_ep_release_planned
        - w_ep_unpublished
      to: w_ep_unpublished
      weight: 5
    w_ep_moderate:
      label: Moderieren
      from:
        - draft
        - w_ep_archives
        - w_ep_presentation
        - w_ep_unpublished
      to: w_ep_presentation
      weight: 3
    w_ep_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_ep_presentation
        - w_ep_release_planned
        - w_ep_unpublished
      to: w_ep_release_planned
      weight: 4
  entity_types:
    node:
      - n_event_page
  default_moderation_state: draft

uuid: 29d99537-d8ca-4755-82db-497fa5b86a4b
langcode: de
status: true
dependencies:
  config:
    - node.type.n_directory_page
  enforced:
    module:
      - av_n_directory_page
  module:
    - content_moderation
id: w_directory_page
label: Verzeichnisseite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_dp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_dp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_dp_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_dp_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_dp_archives
        - w_dp_presentation
        - w_dp_release_planned
        - w_dp_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_dp_archives
        - w_dp_presentation
        - w_dp_release_planned
        - w_dp_unpublished
    w_dp_archive:
      label: Archivieren
      from:
        - published
        - w_dp_unpublished
      to: w_dp_archives
      weight: 2
    w_dp_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_dp_archives
        - w_dp_presentation
        - w_dp_release_planned
        - w_dp_unpublished
      to: w_dp_unpublished
      weight: 5
    w_dp_moderate:
      label: Moderieren
      from:
        - draft
        - w_dp_archives
        - w_dp_presentation
        - w_dp_unpublished
      to: w_dp_presentation
      weight: 3
    w_dp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_dp_presentation
        - w_dp_release_planned
        - w_dp_unpublished
      to: w_dp_release_planned
      weight: 4
  entity_types:
    node:
      - n_directory_page
  default_moderation_state: draft

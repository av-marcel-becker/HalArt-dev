uuid: ee94ff4e-4cd9-45f2-aa9b-76031ac2f711
langcode: de
status: true
dependencies:
  config:
    - node.type.n_news_page
  enforced:
    module:
      - av_n_news_page
  module:
    - content_moderation
id: w_news_page
label: Newsseite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_np_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_np_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_np_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_np_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_np_archives
        - w_np_presentation
        - w_np_release_planned
        - w_np_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_np_archives
        - w_np_presentation
        - w_np_release_planned
        - w_np_unpublished
    w_np_archive:
      label: Archivieren
      from:
        - published
        - w_np_unpublished
      to: w_np_archives
      weight: 2
    w_np_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_np_archives
        - w_np_presentation
        - w_np_release_planned
        - w_np_unpublished
      to: w_np_unpublished
      weight: 5
    w_np_moderate:
      label: Moderieren
      from:
        - draft
        - w_np_archives
        - w_np_presentation
        - w_np_unpublished
      to: w_np_presentation
      weight: 3
    w_np_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_np_presentation
        - w_np_release_planned
        - w_np_unpublished
      to: w_np_release_planned
      weight: 4
  entity_types:
    node:
      - n_news_page
  default_moderation_state: draft

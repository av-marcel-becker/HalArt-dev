uuid: a977947d-280a-4d1a-9cb5-d228fd1caedd
langcode: de
status: true
dependencies:
  config:
    - node.type.n_paragraph_page
  enforced:
    module:
      - av_n_paragraph_page
  module:
    - content_moderation
id: w_paragraph_page
label: Absatzseite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_pp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_pp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_pp_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_pp_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_pp_archives
        - w_pp_presentation
        - w_pp_release_planned
        - w_pp_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_pp_archives
        - w_pp_presentation
        - w_pp_release_planned
        - w_pp_unpublished
    w_pp_archive:
      label: Archivieren
      from:
        - published
        - w_pp_unpublished
      to: w_pp_archives
      weight: 2
    w_pp_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_pp_archives
        - w_pp_presentation
        - w_pp_release_planned
        - w_pp_unpublished
      to: w_pp_unpublished
      weight: 5
    w_pp_moderate:
      label: Moderieren
      from:
        - draft
        - w_pp_archives
        - w_pp_presentation
        - w_pp_unpublished
      to: w_pp_presentation
      weight: 3
    w_pp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_pp_presentation
        - w_pp_release_planned
        - w_pp_unpublished
      to: w_pp_release_planned
      weight: 4
  entity_types:
    node:
      - n_paragraph_page
  default_moderation_state: draft

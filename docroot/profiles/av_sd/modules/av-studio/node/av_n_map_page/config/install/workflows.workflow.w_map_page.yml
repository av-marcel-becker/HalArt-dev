uuid: a8e17bd5-cae4-476f-81f1-530edaaa56c2
langcode: de
status: true
dependencies:
  config:
    - node.type.n_map_page
  enforced:
    module:
      - av_n_map_page
  module:
    - content_moderation
id: w_map_page
label: Kartenseite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_mp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_mp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_mp_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_mp_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_mp_archives
        - w_mp_presentation
        - w_mp_release_planned
        - w_mp_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_mp_archives
        - w_mp_presentation
        - w_mp_release_planned
        - w_mp_unpublished
    w_mp_archive:
      label: Archivieren
      from:
        - published
        - w_mp_unpublished
      to: w_mp_archives
      weight: 2
    w_mp_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_mp_archives
        - w_mp_presentation
        - w_mp_release_planned
        - w_mp_unpublished
      to: w_mp_unpublished
      weight: 5
    w_mp_moderate:
      label: Moderieren
      from:
        - draft
        - w_mp_archives
        - w_mp_presentation
        - w_mp_unpublished
      to: w_mp_presentation
      weight: 3
    w_mp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_mp_presentation
        - w_mp_release_planned
        - w_mp_unpublished
      to: w_mp_release_planned
      weight: 4
  entity_types:
    node:
      - n_map_page
  default_moderation_state: draft

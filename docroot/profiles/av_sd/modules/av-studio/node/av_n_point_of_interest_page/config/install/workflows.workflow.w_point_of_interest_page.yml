uuid: f8cafc4a-c24d-4c5a-a744-e212b08ecb5f
langcode: de
status: true
dependencies:
  config:
    - node.type.n_point_of_interest_page
  enforced:
    module:
      - av_n_point_of_interest_page
  module:
    - content_moderation
id: w_point_of_interest_page
label: 'Ort (POI)'
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_poip_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_poip_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_poip_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_poip_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_poip_archives
        - w_poip_presentation
        - w_poip_release_planned
        - w_poip_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_poip_archives
        - w_poip_presentation
        - w_poip_release_planned
        - w_poip_unpublished
    w_poip_archive:
      label: Archivieren
      from:
        - published
        - w_poip_unpublished
      to: w_poip_archives
      weight: 2
    w_poip_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_poip_archives
        - w_poip_presentation
        - w_poip_release_planned
        - w_poip_unpublished
      to: w_poip_unpublished
      weight: 5
    w_poip_moderate:
      label: Moderieren
      from:
        - draft
        - w_poip_archives
        - w_poip_presentation
        - w_poip_unpublished
      to: w_poip_presentation
      weight: 3
    w_poip_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_poip_presentation
        - w_poip_release_planned
        - w_poip_unpublished
      to: w_poip_release_planned
      weight: 4
  entity_types:
    node:
      - n_point_of_interest_page
  default_moderation_state: draft

label: Zeitspanne
description: "Start- und Enddatum ist hier die gesamte Laufzeit der Anzeige bzw. für die spezielle Zeiteinstellung.<br>\r\nDie Start- und Endzeit gibt an, wann die Anzeige zu sehen ist.<br>\r\nBsp: 01.01.2022 - 01.01.2023 von 00:00 -23:59 - Die Anzeige wird 1 Jahr lang zu jeder Zeit angezeigt<br>\r\nBsp: 01.01.2022 - 01.01.2023 von 00:00 -04:00 - Die Anzeige wird 1 Jahr lang immer nur in der Nacht angezeigt von 0 bis 4 Uhr<br>\r\n(Mehrere Einträge möglich z. B. um Anzeigen 2 mal am Tag anzeigen zu lassen oder für verschiedene Laufzeiten)"
required: false
translatable: false

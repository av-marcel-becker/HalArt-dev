      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_aotyp_archives
        - w_aotyp_presentation
        - w_aotyp_release_planned
        - w_aotyp_unpublished
    publish:
      label: Veröffentlichen

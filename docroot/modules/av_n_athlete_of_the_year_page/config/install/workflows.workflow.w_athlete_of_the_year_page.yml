      from:
        - draft
        - w_aotyp_archives
        - w_aotyp_presentation
        - w_aotyp_unpublished
      to: w_aotyp_presentation
      weight: 3
    w_aotyp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_aotyp_presentation
        - w_aotyp_release_planned
        - w_aotyp_unpublished
      to: w_aotyp_release_planned
      weight: 4

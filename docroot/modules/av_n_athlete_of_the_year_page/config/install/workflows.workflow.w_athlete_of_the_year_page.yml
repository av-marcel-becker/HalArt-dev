type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_aotyp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_aotyp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_aotyp_release_planned:
      published: false
      default_revision: true

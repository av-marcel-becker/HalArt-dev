id: w_composite_card_page
label: Sedcards-Seite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_ccp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_ccp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_ccp_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_ccp_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_ccp_archives
        - w_ccp_presentation
        - w_ccp_release_planned
        - w_ccp_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_ccp_archives
        - w_ccp_presentation
        - w_ccp_release_planned
        - w_ccp_unpublished
    w_ccp_archive:
      label: Archivieren
      from:
        - published
        - w_ccp_unpublished
      to: w_ccp_archives
      weight: 2
    w_ccp_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_ccp_archives
        - w_ccp_presentation
        - w_ccp_release_planned
        - w_ccp_unpublished
      to: w_ccp_unpublished
      weight: 5
    w_ccp_moderate:
      label: Moderieren
      from:
        - draft
        - w_ccp_archives
        - w_ccp_presentation
        - w_ccp_unpublished
      to: w_ccp_presentation
      weight: 3
    w_ccp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_ccp_presentation
        - w_ccp_release_planned
        - w_ccp_unpublished
      to: w_ccp_release_planned
      weight: 4
  entity_types:
    node:
      - n_composite_card_page

uuid: de4b62c9-33e2-45fe-8116-766d81266089
langcode: de
status: true
dependencies:
  config:
    - node.type.n_achievements_page
  enforced:
    module:
      - av_n_achievements_page
  module:
    - content_moderation
id: w_achievements_page
label: Erfolgsseite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_asp_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_asp_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_asp_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_asp_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_asp_archives
        - w_asp_presentation
        - w_asp_release_planned
        - w_asp_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_asp_archives
        - w_asp_presentation
        - w_asp_release_planned
        - w_asp_unpublished
    w_asp_archive:
      label: Archivieren
      from:
        - published
        - w_asp_unpublished
      to: w_asp_archives
      weight: 2
    w_asp_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_asp_archives
        - w_asp_presentation
        - w_asp_release_planned
        - w_asp_unpublished
      to: w_asp_unpublished
      weight: 5
    w_asp_moderate:
      label: Moderieren
      from:
        - draft
        - w_asp_archives
        - w_asp_presentation
        - w_asp_unpublished
      to: w_asp_presentation
      weight: 3
    w_asp_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_asp_presentation
        - w_asp_release_planned
        - w_asp_unpublished
      to: w_asp_release_planned
      weight: 4
  entity_types:
    node:
      - n_achievements_page
  default_moderation_state: draft

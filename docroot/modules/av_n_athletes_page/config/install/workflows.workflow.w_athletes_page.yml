id: w_athletes_page
label: Athleten-Seite
type: content_moderation
type_settings:
  states:
    draft:
      label: Entwurf
      published: false
      default_revision: false
      weight: 0
    published:
      label: Veröffentlicht
      published: true
      default_revision: true
      weight: 1
    w_ap_archives:
      published: false
      default_revision: true
      label: Archiv
      weight: 2
    w_ap_presentation:
      published: false
      default_revision: false
      label: Moderation
      weight: 3
    w_ap_release_planned:
      published: false
      default_revision: true
      label: 'Veröffentlichung geplant'
      weight: 4
    w_ap_unpublished:
      published: false
      default_revision: true
      label: Unveröffentlicht
      weight: 5
  transitions:
    create_new_draft:
      label: 'Neuen Entwurf erstellen'
      to: draft
      weight: 0
      from:
        - draft
        - published
        - w_ap_archives
        - w_ap_presentation
        - w_ap_release_planned
        - w_ap_unpublished
    publish:
      label: Veröffentlichen
      to: published
      weight: 1
      from:
        - draft
        - published
        - w_ap_archives
        - w_ap_presentation
        - w_ap_release_planned
        - w_ap_unpublished
    w_ap_archive:
      label: Archivieren
      from:
        - published
        - w_ap_unpublished
      to: w_ap_archives
      weight: 2
    w_ap_do_not_publish:
      label: 'nicht veröffentlichen'
      from:
        - draft
        - published
        - w_ap_archives
        - w_ap_presentation
        - w_ap_release_planned
        - w_ap_unpublished
      to: w_ap_unpublished
      weight: 5
    w_ap_moderate:
      label: Moderieren
      from:
        - draft
        - w_ap_archives
        - w_ap_presentation
        - w_ap_unpublished
      to: w_ap_presentation
      weight: 3
    w_ap_schedule_publication:
      label: 'Veröffentlichung planen'
      from:
        - draft
        - w_ap_presentation
        - w_ap_release_planned
        - w_ap_unpublished
      to: w_ap_release_planned
      weight: 4
  entity_types:
    node:
      - n_athletes_page
  default_moderation_state: draft
